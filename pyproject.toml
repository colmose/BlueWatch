[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.11"
files = ["bluewatch", "scripts", "run_pipeline.py", "tests", "conftest.py"]
strict = true
ignore_missing_imports = true
warn_unused_configs = true
exclude = ["venv"]

[[tool.mypy.overrides]]
module = ["yaml"]
ignore_missing_imports = true
