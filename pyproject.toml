[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_return_any = true
warn_unused_configs = true
exclude = ["venv"]

[[tool.mypy.overrides]]
module = ["yaml"]
ignore_missing_imports = true
