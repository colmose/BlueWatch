name: Tests

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run lint
        run: python -m ruff check .

      - name: Run typecheck
        run: python -m mypy bluewatch scripts/build_climatology.py run_pipeline.py

      - name: Run tests
        run: python -m pytest tests/ -v
